name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --check
      - name: Test workspace
        run: cargo test --workspace --all-targets --all-features
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Audit public source
        run: tools/audit-public-source
      - name: Scan for accidental secrets
        run: |
          python -m pip install --disable-pip-version-check detect-secrets
          detect-secrets scan --all-files --exclude-files '^target/' \
            --exclude-lines '^slint(-build)? = .*rev = "[0-9a-f]{40}".*$' \
            > /tmp/ferrink-secrets.json
          test "$(jq '.results | length' /tmp/ferrink-secrets.json)" -eq 0
